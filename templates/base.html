<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FutureFit{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="{% block body_class %}{% endblock %}">
    <header class="site-header">
        <div class="header-inner">
            <div class="brand">
                <a href="{% url 'home' %}" class="logo">FutureFit</a>
                <p class="site-tagline">You don't have to know yet</p>
            </div>
            <nav class="nav">
                <a href="{% url 'home' %}" class="nav-link">Home</a>
                <a href="{% url 'career_quiz_about' %}" class="nav-link">About Career Quiz</a>
                <a href="{% url 'career_quiz_home' %}" class="btn btn-header">Take the quiz</a>
            </nav>
        </div>
    </header>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <p><strong>FutureFit</strong> — You don't have to know yet. Built for students.</p>
    </footer>
    <script src="{% static 'js/dimension.js' %}"></script>
    <script src="{% static 'js/career-cards-accordion.js' %}"></script>
</body>
</html>
